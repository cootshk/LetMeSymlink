modLoader = "javafml"
loaderVersion = "${neoforge_version_range}"
license = "${mod_license}"
issueTrackerURL = "https://github.com/cootshk/LetMeSymlink/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
description = '''${mod_description}'''
authors = "${mod_authors}"
logoFile = "icon.png"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "[1.20,)"
ordering = "BEFORE"
